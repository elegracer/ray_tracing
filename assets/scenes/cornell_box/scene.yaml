format_version: 1

includes:
  - ../common/materials/common_materials.yaml

scene:
  id: cornell_box
  label: Cornell Box
  background: [0.0, 0.0, 0.0]
  shapes:
    left_wall:
      type: quad
      origin: [555.0, 0.0, 0.0]
      edge_u: [0.0, 555.0, 0.0]
      edge_v: [0.0, 0.0, 555.0]
    right_wall:
      type: quad
      origin: [0.0, 0.0, 0.0]
      edge_u: [0.0, 555.0, 0.0]
      edge_v: [0.0, 0.0, 555.0]
    light_quad:
      type: quad
      origin: [343.0, 554.0, 332.0]
      edge_u: [-130.0, 0.0, 0.0]
      edge_v: [0.0, 0.0, -105.0]
    floor_quad:
      type: quad
      origin: [0.0, 0.0, 0.0]
      edge_u: [555.0, 0.0, 0.0]
      edge_v: [0.0, 0.0, 555.0]
