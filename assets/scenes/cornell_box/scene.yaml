      max_depth: 50
      vup: [0.0, 1.0, 0.0]
      defocus_angle: 0.0
      focus_dist: 10.0
  extreme:
    samples_per_pixel: 10000
    camera:
      lookfrom: [278.0, 278.0, -800.0]
      lookat: [278.0, 278.0, 0.0]
      vfov: 40.0
      aspect_ratio: 1.7777777777777777
      image_width: 1280
      max_depth: 50
      vup: [0.0, 1.0, 0.0]
