    - shape: left_wall
      material: cornell_green
    - shape: right_wall
      material: cornell_red
    - shape: light_quad
      material: cornell_light
    - shape: floor_quad
      material: cornell_white
    - shape: ceiling_quad
      material: cornell_white
    - shape: back_wall
      material: cornell_white
    - shape: tall_box_shape
